<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — 3D50 Marketplace</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <header class="auth-header">
      <a href="index.html" class="nav__logo auth-logo">
        <span class="nav__logo-text">3D<span>50</span></span>
      </a>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your 3D50 account to download assets.</p>
    </header>

    <form class="auth-form" id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input type="email" id="email" class="form-input" placeholder="name@studio.com" required>
      </div>

      <div class="form-group">
        <div class="form-options">
          <label class="form-label" for="password">Password</label>
          <a href="#" class="auth-link" style="font-size:var(--text-xs);">Forgot password?</a>
        </div>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" id="remember">
          <span class="text-xs text-muted">Remember for 30 days</span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-submit">
        <span class="btn-text">Sign In</span>
        <span class="spinner"></span>
      </button>

      <div class="social-auth">
         <span class="social-auth-label">Or continue with</span>
         <button type="button" class="btn btn-secondary btn-full btn-sm">Google</button>
         <button type="button" class="btn btn-secondary btn-full btn-sm">GitHub</button>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="register.html" class="auth-link">Sign Up Free</a>
      </div>
    </form>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
