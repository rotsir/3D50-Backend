<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Products — 3D50 Marketplace Admin</title>
  <link rel="stylesheet" href="../frontend/css/variables.css">
  <link rel="stylesheet" href="../frontend/css/reset.css">
  <link rel="stylesheet" href="../frontend/css/components.css">
  <link rel="stylesheet" href="../frontend/css/layout.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-layout">

  <!-- Sidebar -->
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="nav__logo" style="padding-left:var(--space-4);">
      <a href="../frontend/dashboard.html" class="nav__logo-text">3D<span>50</span> Admin</a>
    </div>

    <nav class="admin-nav">
      <a href="dashboard.html" class="admin-nav-link">Dashboard Overview</a>
      <a href="products.html" class="admin-nav-link active">Product Inventory</a>
      <a href="users.html" class="admin-nav-link">User Management</a>
      <a href="reviews.html" class="admin-nav-link">Review Moderation</a>
      <a href="discounts.html" class="admin-nav-link">Discount Schedules</a>
      <div class="divider" style="margin:var(--space-4) 0;"></div>
      <a href="../frontend/dashboard.html" class="admin-nav-link">← Website Home</a>
      <a href="../frontend/dashboard.html" class="admin-nav-link text-error" id="admin-logout">Logout</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="admin-content">
    <header class="admin-header">
      <div>
        <div class="section-label">Management Layer</div>
        <h1 class="admin-title">Product Inventory</h1>
      </div>
      <button class="btn btn-primary" id="add-product-trigger">Add New Product</button>
    </header>

    <div class="admin-card">
      <div class="admin-table-controls">
        <div class="admin-search">
          <input type="text" id="admin-product-search" class="form-input" placeholder="Search by title or SKU...">
        </div>
        <div class="admin-filters">
           <select class="form-input" id="admin-cat-filter">
             <option value="">All Categories</option>
           </select>
        </div>
      </div>

      <div class="data-table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Preview</th>
              <th>Title</th>
              <th>Category</th>
              <th>Price</th>
              <th>Downloads</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="admin-product-body">
            <!-- Dynamic products -->
          </tbody>
        </table>
      </div>

      <div class="pagination" id="admin-pagination"></div>
    </div>
  </main>

  <!-- Product Form Modal -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal admin-modal" style="max-width:900px;">
      <div class="modal__header">
        <h2 class="modal__title" id="modal-title">Product Settings</h2>
        <button class="modal__close">×</button>
      </div>
      <div class="modal__body">
        <form id="product-form" class="form-group" enctype="multipart/form-data">
          <input type="hidden" id="edit-id">
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Product Title</label>
              <input type="text" id="title" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label">Category</label>
              <select id="category_id" class="form-input" required></select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Price ($)</label>
              <input type="number" id="price" step="0.01" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label">Status</label>
              <select id="status" class="form-input">
                <option value="published">Published</option>
                <option value="draft">Draft</option>
                <option value="hidden">Hidden</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea id="description" class="form-textarea" rows="4"></textarea>
          </div>

          <div class="form-row">
             <div class="form-group">
                <label class="form-label">Slug</label>
                <input type="text" id="slug" class="form-input">
             </div>
             <div class="form-group">
                <label class="form-label">Tags (comma separated)</label>
                <input type="text" id="tags" class="form-input">
             </div>
          </div>

          <div class="divider" style="margin:var(--space-6) 0;"></div>

          <div class="form-row">
             <div class="form-group">
                <label class="form-label">Primary Image</label>
                <input type="file" id="primary_image" class="form-input" accept="image/*">
             </div>
             <div class="form-group">
                <label class="form-label">Asset File (.zip, .obj, .fbx, .rar)</label>
                <input type="file" id="asset_file" class="form-input">
             </div>
          </div>

          <div class="modal__footer">
            <button type="button" class="btn btn-secondary modal__close">Cancel</button>
            <button type="submit" class="btn btn-primary" id="save-product">Save Product Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="js/products.js"></script>
</body>
</html>
