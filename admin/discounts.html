<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Discounts — 3D50 Admin</title>
  <link rel="stylesheet" href="../frontend/css/variables.css"><link rel="stylesheet" href="../frontend/css/reset.css"><link rel="stylesheet" href="../frontend/css/components.css"><link rel="stylesheet" href="../frontend/css/layout.css"><link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-layout">
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="nav__logo" style="padding-left:var(--space-4);">
      <a href="../frontend/dashboard.html" class="nav__logo-text">3D<span>50</span> Admin</a>
    </div>
    <nav class="admin-nav">
      <a href="dashboard.html" class="admin-nav-link">Dashboard Overview</a>
      <a href="products.html" class="admin-nav-link">Product Inventory</a>
      <a href="users.html" class="admin-nav-link">User Management</a>
      <a href="reviews.html" class="admin-nav-link">Review Moderation</a>
      <a href="discounts.html" class="admin-nav-link active">Discount Schedules</a>
      <div class="divider" style="margin:var(--space-4) 0;"></div>
      <a href="../frontend/dashboard.html" class="admin-nav-link">← Website Home</a>
      <a href="../frontend/dashboard.html" class="admin-nav-link text-error" id="admin-logout">Logout</a>
    </nav>
  </aside>

  <main class="admin-content">
    <header class="admin-header">
      <div><div class="section-label">Revenue Management</div><h1 class="admin-title">Discount Schedules</h1></div>
      <button class="btn btn-primary" id="add-discount-trigger">Create New Discount</button>
    </header>

    <div class="admin-card">
      <div class="data-table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Target</th>
              <th>Value</th>
              <th>Schedule</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="discount-body">
            <!-- Dynamic discounts -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Discount Form Modal -->
  <div class="modal-overlay" id="discount-modal">
    <div class="modal">
      <div class="modal__header"><h2 class="modal__title">Discount Settings</h2><button class="modal__close">×</button></div>
      <div class="modal__body">
        <form id="discount-form" class="form-group">
          <input type="hidden" id="edit-id">
          <label class="form-label">Discount Name (Internal)</label>
          <input type="text" id="name" class="form-input" required placeholder="Summer Sale 2024">
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Type</label>
              <select id="type" class="form-input">
                <option value="percentage">Percentage (%)</option>
                <option value="fixed">Fixed Amount ($)</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Value</label>
              <input type="number" id="value" class="form-input" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Start Date</label>
              <input type="datetime-local" id="starts_at" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label">End Date</label>
              <input type="datetime-local" id="ends_at" class="form-input" required>
            </div>
          </div>

          <div class="modal__footer">
            <button type="button" class="btn btn-secondary modal__close">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Discount</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="../frontend/js/auth.js"></script>
  <script type="module" src="js/discounts.js"></script>
</body>
</html>
